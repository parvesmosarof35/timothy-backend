name: Deploy Timothy Backend

on:
  push:
    branches:
      # Change this to 'master' if your default branch is master
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Deploy Commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu  # Add this!
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd ~/timothy-backend
            git pull
            pnpm install
            pnpm build
            pm2 restart all